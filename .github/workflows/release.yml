name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown
      - run: corepack enable
      - run: yarn install --immutable
      - run: cargo install wasm-pack --version 0.13.1 --locked
      - run: REQUIRE_WASM=1 yarn build
      - run: tar -czf alohayo-world-embed-${{ github.ref_name }}.tar.gz -C dist embed assets
      - run: shasum -a 256 alohayo-world-embed-${{ github.ref_name }}.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            alohayo-world-embed-${{ github.ref_name }}.tar.gz
            checksums.txt
