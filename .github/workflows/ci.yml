name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn format:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn validate:content
      - run: yarn validate:assets
      - run: yarn test
      - run: yarn build
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown
      - run: cargo test --manifest-path crates/world-core/Cargo.toml
