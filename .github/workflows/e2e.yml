name: E2E
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
